<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06060c;
      color: #e4e4ef;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      cursor: default;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    /* Bubble overlay */
    .bubble-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: none; align-items: center; justify-content: center;
      background: rgba(6,6,12,0.85); backdrop-filter: blur(8px);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .bubble-overlay.active { display: flex; opacity: 1; }

    .bubble {
      max-width: 560px; width: 90%; padding: 2.5rem;
      background: radial-gradient(ellipse at top left, #151525, #0d0d18);
      border: 1px solid var(--node-color, #19C0DA);
      border-radius: 20px; position: relative;
      box-shadow: 0 0 60px rgba(var(--node-rgb, 25,192,218), 0.2),
                  inset 0 0 30px rgba(var(--node-rgb, 25,192,218), 0.05);
      transform: scale(0.7); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    }
    .bubble-overlay.active .bubble { transform: scale(1); opacity: 1; }

    .bubble-close {
      position: absolute; top: 1rem; right: 1.2rem; background: none;
      border: none; color: #666; font-size: 1.5rem; cursor: pointer;
      transition: color 0.2s;
    }
    .bubble-close:hover { color: #fff; }

    .bubble-icon {
      width: 56px; height: 56px; border-radius: 14px; display: flex;
      align-items: center; justify-content: center; font-size: 1.5rem;
      margin-bottom: 1rem;
      background: rgba(var(--node-rgb, 25,192,218), 0.15);
      border: 1px solid rgba(var(--node-rgb, 25,192,218), 0.3);
    }

    .bubble h2 {
      font-size: 1.6rem; font-weight: 700; margin-bottom: 0.2rem;
      color: var(--node-color, #19C0DA);
    }
    .bubble .subtitle {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      color: #8888a0; margin-bottom: 1rem;
    }
    .bubble p {
      color: #aaaabc; font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.2rem;
    }
    .bubble .tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem;
    }
    .bubble .tag {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      padding: 0.25rem 0.55rem; border-radius: 4px;
      background: rgba(var(--node-rgb, 25,192,218), 0.1);
      color: var(--node-color, #19C0DA);
    }
    .bubble .link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--node-color, #19C0DA); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s;
    }
    .bubble .link:hover { opacity: 0.7; }
    .bubble .link svg { width: 16px; height: 16px; fill: currentColor; }

    /* Intro hint */
    .hint {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 5; color: #555; font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    /* Social bar */
    .socials {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 5;
      display: flex; gap: 0.6rem;
    }
    .socials a {
      width: 36px; height: 36px; border: 1px solid #222; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #555; text-decoration: none; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .socials a:hover { color: #19C0DA; border-color: #19C0DA; transform: translateY(-2px); }
    .socials svg { width: 16px; height: 16px; fill: currentColor; }
  </style>
</head>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr, mouseX = -1000, mouseY = -1000;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Project data
const projects = [
  {
    id: 'claim', name: 'CLAIM', subtitle: 'Claude AI Memory', icon: '\u{1F9E0}',
    color: '#19C0DA', rgb: '25,192,218',
    desc: 'Single-file, self-bootstrapping memory system for Claude Code. Multi-vault Obsidian integration with autonomous capture, software engineering triggers, and semantic routing. Memory shapes behavior. Vaults store knowledge.',
    tags: ['claude-code-plugin','obsidian','multi-vault','autonomous-capture','self-bootstrapping','POSIX'],
    url: 'https://github.com/kuldeepluvani/claim'
  },
  {
    id: 'claudegotchi', name: 'Claudegotchi', subtitle: 'Developer Wellness Plugin', icon: '\u{1F436}',
    color: '#34d399', rgb: '52,211,153',
    desc: 'Tamagotchi-style wellness tracking for Claude Code. Monitors session duration, velocity, and frustration. Rewards healthy habits through a virtual creature with HP, XP, coins, and evolution stages. Multi-session isolation with per-session state.',
    tags: ['claude-code-plugin','wellness','gamification','multi-session','dashboard','sqlite'],
    url: 'https://github.com/kuldeepluvani/ClaudeGotchi'
  },
  {
    id: 'mycelium', name: 'Mycelium', subtitle: 'Self-Enriching Knowledge Engine', icon: '\u{1F344}',
    color: '#a78bfa', rgb: '167,139,250',
    desc: 'A living knowledge network that learns while you sleep and thinks while you work. Ingests Markdown vaults and Git repos, builds a knowledge graph, auto-discovers specialist AI agents from data clusters, and answers through a hierarchical multi-agent cortex.',
    tags: ['knowledge-graph','multi-agent','NATS JetStream','FAISS','FastAPI','NetworkX'],
    url: 'https://github.com/kuldeepluvani/mycelium'
  }
];

// Nodes: center + projects + decoration nodes
const nodes = [];
const edges = [];

// Center node
const center = {
  x: W/2, y: H/2, vx: 0, vy: 0,
  r: 44, color: '#19C0DA', rgb: '25,192,218',
  label: 'KL', sublabel: 'Kuldeep Luvani',
  type: 'center', project: null, glow: 0
};
nodes.push(center);

// Project nodes — arranged around center
const angleStep = (Math.PI * 2) / projects.length;
const orbitR = Math.min(W, H) * 0.25;
projects.forEach((p, i) => {
  const a = angleStep * i - Math.PI / 2;
  const node = {
    x: W/2 + Math.cos(a) * orbitR, y: H/2 + Math.sin(a) * orbitR,
    vx: 0, vy: 0, r: 34, color: p.color, rgb: p.rgb,
    label: p.icon, sublabel: p.name,
    type: 'project', project: p, glow: 0
  };
  nodes.push(node);
  edges.push({ a: 0, b: nodes.length - 1 });
});

// Ambient floating dots
for (let i = 0; i < 35; i++) {
  nodes.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    r: 2 + Math.random() * 2, color: '#19C0DA', rgb: '25,192,218',
    label: null, sublabel: null, type: 'dot', project: null, glow: 0
  });
}

// Connect some dots to each other for ambient graph feel
for (let i = 4; i < nodes.length; i++) {
  for (let j = i + 1; j < nodes.length; j++) {
    const dx = nodes[i].x - nodes[j].x;
    const dy = nodes[i].y - nodes[j].y;
    if (Math.sqrt(dx*dx + dy*dy) < 200) {
      edges.push({ a: i, b: j });
    }
  }
}

// Physics
function physics() {
  const centerX = W / 2, centerY = H / 2;

  nodes.forEach((n, i) => {
    if (n.type === 'dot') {
      n.x += n.vx; n.y += n.vy;
      if (n.x < -20) n.x = W + 20;
      if (n.x > W + 20) n.x = -20;
      if (n.y < -20) n.y = H + 20;
      if (n.y > H + 20) n.y = -20;
      return;
    }

    if (n.type === 'center') {
      // Gently attract center to screen center
      n.vx += (centerX - n.x) * 0.002;
      n.vy += (centerY - n.y) * 0.002;
    }

    if (n.type === 'project') {
      // Spring to orbit distance from center
      const dx = n.x - nodes[0].x;
      const dy = n.y - nodes[0].y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = (dist - orbitR) * 0.003;
      n.vx -= (dx / dist) * force;
      n.vy -= (dy / dist) * force;

      // Slow orbital drift
      const angle = Math.atan2(dy, dx);
      n.vx += Math.cos(angle + Math.PI/2) * 0.02;
      n.vy += Math.sin(angle + Math.PI/2) * 0.02;
    }

    // Mouse interaction — gentle repulsion from cursor
    const mdx = n.x - mouseX;
    const mdy = n.y - mouseY;
    const mdist = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
    if (mdist < 150 && n.type !== 'dot') {
      n.vx += (mdx / mdist) * 0.5;
      n.vy += (mdy / mdist) * 0.5;
    }

    // Repulsion between project nodes
    nodes.forEach((other, j) => {
      if (i === j || other.type === 'dot') return;
      const dx = n.x - other.x;
      const dy = n.y - other.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      if (dist < 120) {
        const force = (120 - dist) * 0.005;
        n.vx += (dx / dist) * force;
        n.vy += (dy / dist) * force;
      }
    });

    n.vx *= 0.95; n.vy *= 0.95;
    n.x += n.vx; n.y += n.vy;

    // Keep on screen
    n.x = Math.max(n.r, Math.min(W - n.r, n.x));
    n.y = Math.max(n.r, Math.min(H - n.r, n.y));
  });
}

// Hover detection
let hoveredNode = null;
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  hoveredNode = null;
  canvas.style.cursor = 'default';
  nodes.forEach(n => {
    if (n.type === 'dot') return;
    const dx = e.clientX - n.x, dy = e.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) < n.r + 8) {
      hoveredNode = n;
      if (n.type === 'project') canvas.style.cursor = 'pointer';
    }
  });
});

// Click — open bubble
canvas.addEventListener('click', e => {
  nodes.forEach(n => {
    if (n.type !== 'project') return;
    const dx = e.clientX - n.x, dy = e.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) < n.r + 8) openBubble(n.project);
  });
});

// Bubble
const overlay = document.getElementById('bubbleOverlay');
const bubbleEl = document.getElementById('bubbleContent');

function openBubble(p) {
  bubbleEl.style.setProperty('--node-color', p.color);
  bubbleEl.style.setProperty('--node-rgb', p.rgb);
  document.getElementById('bubbleIcon').textContent = projects.find(x=>x.id===p.id).icon;
  document.getElementById('bubbleName').textContent = p.name;
  document.getElementById('bubbleSubtitle').textContent = p.subtitle;
  document.getElementById('bubbleDesc').textContent = p.desc;
  const tagsEl = document.getElementById('bubbleTags');
  tagsEl.innerHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('bubbleLink').href = p.url;
  overlay.classList.add('active');
}

function closeBubble() { overlay.classList.remove('active'); }
document.getElementById('bubbleClose').addEventListener('click', closeBubble);
overlay.addEventListener('click', e => { if (e.target === overlay) closeBubble(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBubble(); });

// Draw
let time = 0;
function draw() {
  time += 0.01;
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(25,192,218,0.03)';
  ctx.lineWidth = 0.5;
  const gridSize = 60;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Draw edges
  edges.forEach(e => {
    const a = nodes[e.a], b = nodes[e.b];
    const dx = a.x - b.x, dy = a.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    let alpha = 0;

    if (a.type === 'dot' || b.type === 'dot') {
      alpha = Math.max(0, 1 - dist / 200) * 0.06;
    } else {
      alpha = Math.max(0, 1 - dist / (orbitR * 2)) * 0.3;
    }

    if (alpha <= 0) return;

    // Animated pulse along edges for project connections
    if (a.type !== 'dot' && b.type !== 'dot') {
      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      const pulse = (Math.sin(time * 2 + e.a) + 1) / 2;
      grad.addColorStop(0, `rgba(${a.rgb},${alpha})`);
      grad.addColorStop(pulse, `rgba(${a.rgb},${alpha * 2})`);
      grad.addColorStop(1, `rgba(${b.rgb},${alpha})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = `rgba(25,192,218,${alpha})`;
      ctx.lineWidth = 0.5;
    }

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const isHovered = n === hoveredNode;
    const targetGlow = isHovered ? 1 : 0;
    n.glow += (targetGlow - n.glow) * 0.1;

    if (n.type === 'dot') {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${n.rgb},${0.15 + Math.sin(time + n.x) * 0.05})`;
      ctx.fill();
      return;
    }

    const r = n.r + n.glow * 6;

    // Outer glow
    if (n.glow > 0.01 || n.type === 'project') {
      const glowR = r + 20 + n.glow * 15;
      const grad = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, glowR);
      const glowAlpha = n.type === 'center' ? 0.1 : (0.08 + n.glow * 0.15);
      grad.addColorStop(0, `rgba(${n.rgb},${glowAlpha})`);
      grad.addColorStop(1, `rgba(${n.rgb},0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Ring
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${n.rgb},0.08)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${n.rgb},${0.4 + n.glow * 0.4})`;
    ctx.lineWidth = 1.5 + n.glow;
    ctx.stroke();

    // Spinning arc for project nodes
    if (n.type === 'project') {
      ctx.beginPath();
      const arcStart = time * 1.5 + nodes.indexOf(n);
      ctx.arc(n.x, n.y, r + 4, arcStart, arcStart + Math.PI * 0.6);
      ctx.strokeStyle = `rgba(${n.rgb},${0.3 + n.glow * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label (icon/text)
    if (n.label) {
      ctx.font = n.type === 'center' ? '600 20px Inter' : '22px sans-serif';
      ctx.fillStyle = n.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y);
    }

    // Sublabel below
    if (n.sublabel) {
      ctx.font = n.type === 'center' ? '300 11px Inter' : '500 11px Inter';
      ctx.fillStyle = `rgba(${n.rgb},${0.6 + n.glow * 0.4})`;
      ctx.textAlign = 'center';
      ctx.fillText(n.sublabel, n.x, n.y + r + 16);
    }
  });

  // Center typing text
  const typingY = nodes[0].y + nodes[0].r + 38;
  ctx.font = '400 13px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(25,192,218,0.5)';
  ctx.textAlign = 'center';
  const currentPhrase = typingPhrases[currentPhraseIdx];
  const displayText = currentPhrase.substring(0, currentCharIdx);
  ctx.fillText(displayText + (Math.floor(time * 3) % 2 === 0 ? '|' : ''), nodes[0].x, typingY);

  physics();
  requestAnimationFrame(draw);
}

// Typing for center node
const typingPhrases = [
  'building AI-powered developer tools',
  'knowledge systems that think while you work',
  'memory that persists across sessions',
  'wellness-first developer experience'
];
let currentPhraseIdx = 0, currentCharIdx = 0, typingDeleting = false, typingPause = 0;

setInterval(() => {
  if (typingPause > 0) { typingPause--; return; }
  if (typingDeleting) {
    currentCharIdx--;
    if (currentCharIdx <= 0) {
      typingDeleting = false;
      currentPhraseIdx = (currentPhraseIdx + 1) % typingPhrases.length;
      typingPause = 8;
    }
  } else {
    currentCharIdx++;
    if (currentCharIdx > typingPhrases[currentPhraseIdx].length) {
      typingDeleting = true;
      typingPause = 40;
    }
  }
}, 50);

// Touch support
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  nodes.forEach(n => {
    if (n.type !== 'project') return;
    const dx = t.clientX - n.x, dy = t.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) < n.r + 12) openBubble(n.project);
  });
});

draw();
</script>

</body>
