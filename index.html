<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuldeep Luvani — Software Engineer</title>
  <meta name="description" content="Software Engineer building AI-powered developer tools, knowledge systems, and automation platforms.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06060c;
      color: #e4e4ef;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      cursor: default;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    /* Bubble overlay */
    .bubble-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: none; align-items: center; justify-content: center;
      background: rgba(6,6,12,0.85); backdrop-filter: blur(8px);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .bubble-overlay.active { display: flex; opacity: 1; }

    .bubble {
      max-width: 560px; width: 90%; padding: 2.5rem;
      background: radial-gradient(ellipse at top left, #151525, #0d0d18);
      border: 1px solid var(--node-color, #19C0DA);
      border-radius: 20px; position: relative;
      box-shadow: 0 0 60px rgba(var(--node-rgb, 25,192,218), 0.2),
                  inset 0 0 30px rgba(var(--node-rgb, 25,192,218), 0.05);
      transform: scale(0.7); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    }
    .bubble-overlay.active .bubble { transform: scale(1); opacity: 1; }

    .bubble-close {
      position: absolute; top: 1rem; right: 1.2rem; background: none;
      border: none; color: #666; font-size: 1.5rem; cursor: pointer;
      transition: color 0.2s;
    }
    .bubble-close:hover { color: #fff; }

    .bubble-icon {
      width: 56px; height: 56px; border-radius: 14px; display: flex;
      align-items: center; justify-content: center; font-size: 1.5rem;
      margin-bottom: 1rem;
      background: rgba(var(--node-rgb, 25,192,218), 0.15);
      border: 1px solid rgba(var(--node-rgb, 25,192,218), 0.3);
    }

    .bubble h2 {
      font-size: 1.6rem; font-weight: 700; margin-bottom: 0.2rem;
      color: var(--node-color, #19C0DA);
    }
    .bubble .subtitle {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      color: #8888a0; margin-bottom: 1rem;
    }
    .bubble p {
      color: #aaaabc; font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.2rem;
    }
    .bubble .tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem;
    }
    .bubble .tag {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      padding: 0.25rem 0.55rem; border-radius: 4px;
      background: rgba(var(--node-rgb, 25,192,218), 0.1);
      color: var(--node-color, #19C0DA);
    }
    .bubble .link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--node-color, #19C0DA); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s;
    }
    .bubble .link:hover { opacity: 0.7; }
    .bubble .link svg { width: 16px; height: 16px; fill: currentColor; }

    /* Intro hint */
    .hint {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 5; color: #555; font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  </style>
</head>
<body>

<canvas id="graph"></canvas>

<div class="hint">click a node to explore</div>

<!-- Bubble overlay -->
<div class="bubble-overlay" id="bubbleOverlay">
  <div class="bubble" id="bubbleContent">
    <button class="bubble-close" id="bubbleClose">&times;</button>
    <div class="bubble-icon" id="bubbleIcon"></div>
    <h2 id="bubbleName"></h2>
    <div class="subtitle" id="bubbleSubtitle"></div>
    <p id="bubbleDesc"></p>
    <div class="tags" id="bubbleTags"></div>
    <a class="link" id="bubbleLink" href="#" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
      <span>View on GitHub</span>
    </a>
  </div>
</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr, mouseX = -1000, mouseY = -1000;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Responsive scaling
  const scale = Math.min(W, H) / 800; // 1.0 at 800px, scales up/down
  S = Math.max(0.6, Math.min(1.6, scale)); // clamp 0.6 to 1.6
  orbitR = Math.min(W, H) * 0.24;
  socialOrbitR = Math.min(W, H) * 0.40;
  // Update node radii on resize
  if (nodes.length) {
    nodes[0].r = 54 * S; // center
    for (let i = 1; i <= projects.length; i++) nodes[i].r = 42 * S;
    for (let i = projects.length + 1; i <= projects.length + socials.length; i++) nodes[i].r = 26 * S;
  }
}
let orbitR, socialOrbitR, S = 1;
window.addEventListener('resize', resize);
resize();

// Project data
const projects = [
  {
    id: 'claim', name: 'CLAIM', subtitle: 'Claude AI Memory', icon: '\u{1F9E0}',
    color: '#19C0DA', rgb: '25,192,218',
    desc: 'Single-file, self-bootstrapping memory system for Claude Code. Multi-vault Obsidian integration with autonomous capture, software engineering triggers, and semantic routing. Memory shapes behavior. Vaults store knowledge.',
    tags: ['claude-code-plugin','obsidian','multi-vault','autonomous-capture','self-bootstrapping','POSIX'],
    url: 'https://github.com/kuldeepluvani/claim'
  },
  {
    id: 'claudegotchi', name: 'Claudegotchi', subtitle: 'Developer Wellness Plugin', icon: '\u{1F436}',
    color: '#34d399', rgb: '52,211,153',
    desc: 'Tamagotchi-style wellness tracking for Claude Code. Monitors session duration, velocity, and frustration. Rewards healthy habits through a virtual creature with HP, XP, coins, and evolution stages. Multi-session isolation with per-session state.',
    tags: ['claude-code-plugin','wellness','gamification','multi-session','dashboard','sqlite'],
    url: 'https://github.com/kuldeepluvani/ClaudeGotchi'
  },
  {
    id: 'mycelium', name: 'Mycelium', subtitle: 'Self-Enriching Knowledge Engine', icon: '\u{1F344}',
    color: '#a78bfa', rgb: '167,139,250',
    desc: 'A living knowledge network that learns while you sleep and thinks while you work. Ingests Markdown vaults and Git repos, builds a knowledge graph, auto-discovers specialist AI agents from data clusters, and answers through a hierarchical multi-agent cortex.',
    tags: ['knowledge-graph','multi-agent','NATS JetStream','FAISS','FastAPI','NetworkX'],
    url: 'https://github.com/kuldeepluvani/mycelium'
  },
  {
    id: 'gittimemachine', name: 'GitTimeMachine', subtitle: "Like Apple's Time Machine, but for Git", icon: '\u{231B}',
    color: '#fbbf24', rgb: '251,191,36',
    desc: "Like Apple's Time Machine, but for Git. Visual time-travel through your repository history. Browse, compare, and restore any file from any point in time with an intuitive timeline interface.",
    tags: ['git','version-control','time-machine','cli','developer-tools'],
    url: 'https://github.com/kuldeepluvani/GitTimeMachine'
  }
];

// Social/link data
const socials = [
  { id: 'github', label: 'GH', name: 'GitHub', color: '#8b949e', rgb: '139,148,158', url: 'https://github.com/kuldeepluvani', icon: '\u{2B22}' },
  { id: 'linkedin', label: 'LI', name: 'LinkedIn', color: '#0a66c2', rgb: '10,102,194', url: 'https://www.linkedin.com/in/kuldeep-luvani-28a93336/', icon: '\u{1F310}' },
  { id: 'email', label: '@', name: 'Email', color: '#f472b6', rgb: '244,114,182', url: 'mailto:kuldeepluvani@gmail.com', icon: '\u{2709}' },
  { id: 'resume', label: 'CV', name: 'Resume', color: '#fb923c', rgb: '251,146,60', url: 'Kuldeep Luvani Resume.pdf', icon: '\u{1F4C4}' },
  { id: 'blog', label: 'B', name: 'Blog', color: '#60a5fa', rgb: '96,165,250', url: 'https://pythonhighschool.wordpress.com/', icon: '\u{270D}' },
];

// Nodes
const nodes = [];
const edges = [];

// Center node (index 0)
const center = {
  x: W/2, y: H/2, vx: 0, vy: 0,
  r: 54 * S, color: '#19C0DA', rgb: '25,192,218',
  label: 'KL', sublabel: 'Kuldeep Luvani',
  type: 'center', data: null, glow: 0
};
nodes.push(center);

// Project nodes (indices 1-4)
const projAngleStep = (Math.PI * 2) / projects.length;
projects.forEach((p, i) => {
  const a = projAngleStep * i - Math.PI / 2;
  nodes.push({
    x: W/2 + Math.cos(a) * orbitR, y: H/2 + Math.sin(a) * orbitR,
    vx: 0, vy: 0, r: 42 * S, color: p.color, rgb: p.rgb,
    label: p.icon, sublabel: p.name,
    type: 'project', data: p, glow: 0,
    orbitAngle: a, orbitRadius: orbitR
  });
  edges.push({ a: 0, b: nodes.length - 1, type: 'project' });
});

// Social nodes (indices 5-9)
const socialAngleStep = (Math.PI * 2) / socials.length;
socials.forEach((s, i) => {
  const a = socialAngleStep * i + Math.PI / 5;
  nodes.push({
    x: W/2 + Math.cos(a) * socialOrbitR, y: H/2 + Math.sin(a) * socialOrbitR,
    vx: 0, vy: 0, r: 26 * S, color: s.color, rgb: s.rgb,
    label: s.label, sublabel: s.name,
    type: 'social', data: s, glow: 0,
    orbitAngle: a, orbitRadius: socialOrbitR
  });
  edges.push({ a: 0, b: nodes.length - 1, type: 'social' });
});

// Connect projects to each other with faint edges
for (let i = 1; i <= projects.length; i++) {
  for (let j = i + 1; j <= projects.length; j++) {
    edges.push({ a: i, b: j, type: 'inter' });
  }
}

// Ambient dots
for (let i = 0; i < 30; i++) {
  nodes.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    r: 1.5 + Math.random() * 2, color: '#19C0DA', rgb: '25,192,218',
    label: null, sublabel: null, type: 'dot', data: null, glow: 0
  });
}

// Ambient dot connections
const dotStart = 1 + projects.length + socials.length;
for (let i = dotStart; i < nodes.length; i++) {
  for (let j = i + 1; j < nodes.length; j++) {
    const dx = nodes[i].x - nodes[j].x;
    const dy = nodes[i].y - nodes[j].y;
    if (Math.sqrt(dx*dx + dy*dy) < 180) {
      edges.push({ a: i, b: j, type: 'ambient' });
    }
  }
}

// Physics
function physics() {
  const cx = W / 2, cy = H / 2;

  nodes.forEach((n, i) => {
    if (n.type === 'dot') {
      n.x += n.vx; n.y += n.vy;
      if (n.x < -20) n.x = W + 20; if (n.x > W + 20) n.x = -20;
      if (n.y < -20) n.y = H + 20; if (n.y > H + 20) n.y = -20;
      return;
    }

    if (n.type === 'center') {
      n.vx += (cx - n.x) * 0.003;
      n.vy += (cy - n.y) * 0.003;
    }

    if (n.type === 'project' || n.type === 'social') {
      const targetR = n.type === 'project' ? orbitR : socialOrbitR;
      const dx = n.x - nodes[0].x;
      const dy = n.y - nodes[0].y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = (dist - targetR) * 0.004;
      n.vx -= (dx / dist) * force;
      n.vy -= (dy / dist) * force;

      // Very slow orbit — gentle enough to click
      const angle = Math.atan2(dy, dx);
      const speed = n.type === 'social' ? 0.005 : 0.008;
      n.vx += Math.cos(angle + Math.PI/2) * speed;
      n.vy += Math.sin(angle + Math.PI/2) * speed;
    }

    // Mouse ATTRACTION — nodes gently drift toward cursor when nearby
    if (n.type !== 'dot') {
      const mdx = mouseX - n.x;
      const mdy = mouseY - n.y;
      const mdist = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
      if (mdist < 200 && mdist > n.r) {
        const strength = (1 - mdist / 200) * 0.15;
        n.vx += (mdx / mdist) * strength;
        n.vy += (mdy / mdist) * strength;
      }
    }

    // Node repulsion
    nodes.forEach((other, j) => {
      if (i === j || other.type === 'dot') return;
      const dx = n.x - other.x;
      const dy = n.y - other.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const minDist = n.r + other.r + 30;
      if (dist < minDist) {
        const force = (minDist - dist) * 0.008;
        n.vx += (dx / dist) * force;
        n.vy += (dy / dist) * force;
      }
    });

    n.vx *= 0.92; n.vy *= 0.92;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(n.r + 10, Math.min(W - n.r - 10, n.x));
    n.y = Math.max(n.r + 10, Math.min(H - n.r - 10, n.y));
  });
}

// Hover
let hoveredNode = null;
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  hoveredNode = null;
  canvas.style.cursor = 'default';
  nodes.forEach(n => {
    if (n.type === 'dot') return;
    const dx = e.clientX - n.x, dy = e.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) < n.r + 15) {
      hoveredNode = n;
      if (n.type === 'project' || n.type === 'social') canvas.style.cursor = 'pointer';
    }
  });
});

// Click
canvas.addEventListener('click', e => {
  nodes.forEach(n => {
    const dx = e.clientX - n.x, dy = e.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) > n.r + 15) return;
    if (n.type === 'project') openBubble(n.data);
    if (n.type === 'social') window.open(n.data.url, n.data.url.startsWith('mailto') ? '_self' : '_blank');
  });
});

// Touch
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  nodes.forEach(n => {
    const dx = t.clientX - n.x, dy = t.clientY - n.y;
    if (Math.sqrt(dx*dx + dy*dy) > n.r + 20) return;
    if (n.type === 'project') openBubble(n.data);
    if (n.type === 'social') window.open(n.data.url, n.data.url.startsWith('mailto') ? '_self' : '_blank');
  });
});

// Bubble
const overlay = document.getElementById('bubbleOverlay');
const bubbleEl = document.getElementById('bubbleContent');

function openBubble(p) {
  bubbleEl.style.setProperty('--node-color', p.color);
  bubbleEl.style.setProperty('--node-rgb', p.rgb);
  document.getElementById('bubbleIcon').textContent = p.icon;
  document.getElementById('bubbleName').textContent = p.name;
  document.getElementById('bubbleSubtitle').textContent = p.subtitle;
  document.getElementById('bubbleDesc').textContent = p.desc;
  document.getElementById('bubbleTags').innerHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('bubbleLink').href = p.url;
  overlay.classList.add('active');
}

function closeBubble() { overlay.classList.remove('active'); }
document.getElementById('bubbleClose').addEventListener('click', closeBubble);
overlay.addEventListener('click', e => { if (e.target === overlay) closeBubble(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBubble(); });

// Draw
let time = 0;
function draw() {
  time += 0.008;
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(25,192,218,0.025)';
  ctx.lineWidth = 0.5;
  const gs = 60;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Edges
  edges.forEach(e => {
    const a = nodes[e.a], b = nodes[e.b];
    const dx = a.x - b.x, dy = a.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (e.type === 'ambient') {
      const alpha = Math.max(0, 1 - dist / 180) * 0.05;
      if (alpha <= 0) return;
      ctx.strokeStyle = `rgba(25,192,218,${alpha})`;
      ctx.lineWidth = 0.5;
    } else if (e.type === 'social') {
      const alpha = Math.max(0, 1 - dist / (socialOrbitR * 2)) * 0.12;
      ctx.strokeStyle = `rgba(${b.rgb || a.rgb},${alpha})`;
      ctx.lineWidth = 0.8;
    } else if (e.type === 'inter') {
      const alpha = Math.max(0, 1 - dist / (orbitR * 3)) * 0.06;
      if (alpha <= 0) return;
      ctx.strokeStyle = `rgba(100,100,140,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.setLineDash([4, 6]);
    } else {
      // Project-to-center
      const pulse = (Math.sin(time * 2.5 + e.b) + 1) / 2;
      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `rgba(${a.rgb},0.15)`);
      grad.addColorStop(pulse, `rgba(${b.rgb},0.4)`);
      grad.addColorStop(1, `rgba(${b.rgb},0.15)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
    }

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Nodes
  nodes.forEach(n => {
    const isHovered = n === hoveredNode;
    n.glow += ((isHovered ? 1 : 0) - n.glow) * 0.1;

    if (n.type === 'dot') {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${n.rgb},${0.12 + Math.sin(time * 1.5 + n.x) * 0.04})`;
      ctx.fill();
      return;
    }

    const r = n.r + n.glow * 5;

    // Glow
    const glowR = r + (n.type === 'social' ? 12 : 20) + n.glow * 12;
    const grad = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, glowR);
    const ga = n.type === 'center' ? 0.1 : (n.type === 'social' ? 0.06 : 0.08);
    grad.addColorStop(0, `rgba(${n.rgb},${ga + n.glow * 0.15})`);
    grad.addColorStop(1, `rgba(${n.rgb},0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Circle fill + border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${n.rgb},${n.type === 'social' ? 0.06 : 0.08})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${n.rgb},${0.35 + n.glow * 0.4})`;
    ctx.lineWidth = n.type === 'social' ? 1 : 1.5 + n.glow;
    ctx.stroke();

    // Spinning arc for project nodes
    if (n.type === 'project') {
      ctx.beginPath();
      const arcS = time * 1.5 + nodes.indexOf(n) * 1.2;
      ctx.arc(n.x, n.y, r + 4, arcS, arcS + Math.PI * 0.5);
      ctx.strokeStyle = `rgba(${n.rgb},${0.25 + n.glow * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label
    if (n.label) {
      if (n.type === 'center') {
        ctx.font = `600 ${Math.round(22 * S)}px Inter`;
      } else if (n.type === 'social') {
        ctx.font = `600 ${Math.round(12 * S)}px "JetBrains Mono", monospace`;
      } else {
        ctx.font = `${Math.round(26 * S)}px sans-serif`;
      }
      ctx.fillStyle = n.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y);
    }

    // Sublabel
    if (n.sublabel) {
      const fontSize = n.type === 'social' ? Math.round(10 * S) : Math.round(12 * S);
      const weight = n.type === 'center' ? '300' : '500';
      ctx.font = `${weight} ${fontSize}px Inter`;
      ctx.fillStyle = `rgba(${n.rgb},${0.5 + n.glow * 0.4})`;
      ctx.textAlign = 'center';
      ctx.fillText(n.sublabel, n.x, n.y + r + (n.type === 'social' ? 14 : 18));
    }
  });

  // Typing text under center
  const typingY = nodes[0].y + nodes[0].r + 36;
  ctx.font = '400 12px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(25,192,218,0.45)';
  ctx.textAlign = 'center';
  const phrase = typingPhrases[tpIdx];
  const display = phrase.substring(0, tcIdx);
  ctx.fillText(display + (Math.floor(time * 4) % 2 === 0 ? '|' : ''), nodes[0].x, typingY);

  physics();
  requestAnimationFrame(draw);
}

// Typing
const typingPhrases = [
  'building AI-powered developer tools',
  'knowledge systems that think while you work',
  'memory that persists across sessions',
  'wellness-first developer experience'
];
let tpIdx = 0, tcIdx = 0, tDel = false, tPause = 0;
setInterval(() => {
  if (tPause > 0) { tPause--; return; }
  if (tDel) {
    tcIdx--;
    if (tcIdx <= 0) { tDel = false; tpIdx = (tpIdx + 1) % typingPhrases.length; tPause = 8; }
  } else {
    tcIdx++;
    if (tcIdx > typingPhrases[tpIdx].length) { tDel = true; tPause = 40; }
  }
}, 50);

draw();
</script>
